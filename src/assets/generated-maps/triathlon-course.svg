<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="55%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000055"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="170" y="130" width="340" height="180" rx="44" fill="#93c5fd" opacity="0.45"/>
  <rect x="1040" y="120" width="360" height="200" rx="44" fill="#86efac" opacity="0.42"/>
  <rect x="240" y="560" width="320" height="200" rx="40" fill="#bbf7d0" opacity="0.46"/>
  <rect x="1000" y="520" width="360" height="220" rx="40" fill="#c7d2fe" opacity="0.42"/>

  <path d="M 180 250 C 320 170, 480 170, 620 250 C 780 340, 980 340, 1140 250 C 1280 170, 1410 180, 1490 250" fill="none" stroke="#ffffffaa" stroke-width="18" stroke-linecap="round"/>
  <path d="M 240 610 C 360 540, 520 520, 660 580 C 800 640, 980 640, 1120 580 C 1260 520, 1380 540, 1440 610" fill="none" stroke="#0f766e" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
  <polyline points="210,260 350,250 490,280 620,350 780,430" fill="none" stroke="#0ea5e9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="790,430 880,390 980,360 1100,360 1210,410 1290,480" fill="none" stroke="#2563eb" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="1290,480 1220,580 1110,670 980,720 820,740 650,720 500,670 390,610" fill="none" stroke="#f97316" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <g fill="#0f172a" font-family="Arial, sans-serif" font-size="20" font-weight="700">
    <circle cx="210" cy="260" r="12" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/><circle cx="210" cy="260" r="5" fill="#38bdf8"/><rect x="224" y="216" rx="10" ry="10" width="200" height="34" fill="#0f172acc" stroke="#334155" stroke-width="1.5"/><text x="238" y="238" fill="#e2e8f0">Start line</text>
    <circle cx="780" cy="430" r="12" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/><circle cx="780" cy="430" r="5" fill="#38bdf8"/><rect x="794" y="386" rx="10" ry="10" width="200" height="34" fill="#0f172acc" stroke="#334155" stroke-width="1.5"/><text x="808" y="408" fill="#e2e8f0">Swim exit</text>
    <circle cx="980" cy="360" r="12" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/><circle cx="980" cy="360" r="5" fill="#38bdf8"/><rect x="994" y="316" rx="10" ry="10" width="200" height="34" fill="#0f172acc" stroke="#334155" stroke-width="1.5"/><text x="1008" y="338" fill="#e2e8f0">T1</text>
    <circle cx="1290" cy="480" r="12" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/><circle cx="1290" cy="480" r="5" fill="#38bdf8"/><rect x="1304" y="436" rx="10" ry="10" width="200" height="34" fill="#0f172acc" stroke="#334155" stroke-width="1.5"/><text x="1318" y="458" fill="#e2e8f0">Bike split</text>
    <circle cx="980" cy="720" r="12" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/><circle cx="980" cy="720" r="5" fill="#38bdf8"/><rect x="994" y="676" rx="10" ry="10" width="200" height="34" fill="#0f172acc" stroke="#334155" stroke-width="1.5"/><text x="1008" y="698" fill="#e2e8f0">T2</text>
    <circle cx="390" cy="610" r="12" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/><circle cx="390" cy="610" r="5" fill="#38bdf8"/><rect x="404" y="626" rx="10" ry="10" width="200" height="34" fill="#0f172acc" stroke="#334155" stroke-width="1.5"/><text x="418" y="648" fill="#e2e8f0">Finish line</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="48" y="36" width="470" height="120" rx="20" fill="#0b1220d9" stroke="#334155" stroke-width="2"/>
  </g>
  <text x="74" y="92" font-size="40" fill="#f8fafc" font-family="Arial, sans-serif" font-weight="800">Triathlon Course Map</text>
  <text x="74" y="130" font-size="24" fill="#cbd5e1" font-family="Arial, sans-serif">Swim, bike and run route markers for multisport seed data</text>
</svg>
