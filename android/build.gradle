buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 34
        ndkVersion = "27.0.12077973"
        kotlinVersion = "2.0.21"
        auth0ManifestPlaceholders = [
            auth0Domain: "auth.spot-me.ai",
            auth0Scheme: "com.gregreynders.spotme.auth0",
            auth0PathPrefix: "/android/com.gregreynders.spotme/callback"
        ]
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
        maven {
            url("$rootDir/../node_modules/detox/Detox-android")
        }
    }
}

subprojects { subproject ->
    subproject.plugins.withId("com.android.library") {
        if (subproject.hasProperty("android")) {
            subproject.android {
                packaging {
                    jniLibs {
                        // AndroidTest APKs from several RN libraries package the same shared
                        // React Native JNI libs. Pick the shared copy so instrumented builds
                        // can complete without duplicate-lib merge failures.
                        pickFirsts += [
                            "**/libfbjni.so",
                            "**/libreactnative.so",
                            "**/libhermestooling.so",
                            "**/libjsi.so",
                            "**/libjsctooling.so",
                            "**/libc++_shared.so",
                        ]
                    }
                }
            }
        }

        if (subproject.name == "react-native-auth0" && subproject.hasProperty("android")) {
            subproject.android {
                defaultConfig {
                    manifestPlaceholders = rootProject.ext.auth0ManifestPlaceholders
                }
            }
        }
    }
}
